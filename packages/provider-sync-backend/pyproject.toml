[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "better-agent-provider-sync-backend"
version = "0.1.0"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
  "fastapi",
  "pydantic",
  "PyYAML",
]

[project.optional-dependencies]
server = ["uvicorn"]

[project.scripts]
provider-sync-backend = "provider_sync_backend.standalone:main"

[tool.hatch.build.targets.wheel]
packages = ["src/provider_sync_backend"]
